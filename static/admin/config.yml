backend:
  name: github
  repo: RaihnForge/raihnforge-www
  branch: main

publish_mode: editorial_workflow
media_folder: static/images
public_folder: /images

collections:
  - name: art
    label: "Visual Design"
    folder: content/art
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Date", name: date, widget: datetime, format: "YYYY-MM-DD" }
      - { label: "Description", name: description, widget: text, required: false }
      - { label: "Tags", name: tags, widget: list, required: false }
      - { label: "Image", name: image, widget: image, required: false }
      - { label: "Medium", name: medium, widget: string, required: false, hint: "e.g. Digital, Pencil, Acrylic, Mixed Media" }
      - { label: "Year", name: year, widget: number, required: false }
      - { label: "Featured", name: featured, widget: boolean, default: false, required: false }
      - { label: "Draft", name: draft, widget: boolean, default: false }
      - { label: "Recovered", name: recovered, widget: hidden, required: false }
      - { label: "Body", name: body, widget: markdown }

  - name: blog
    label: "Journal"
    folder: content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Date", name: date, widget: datetime, format: "YYYY-MM-DD" }
      - { label: "Description", name: description, widget: text, required: false }
      - { label: "Tags", name: tags, widget: list, required: false }
      - { label: "Image", name: image, widget: image, required: false }
      - { label: "Draft", name: draft, widget: boolean, default: false }
      - { label: "Recovered", name: recovered, widget: hidden, required: false }
      - { label: "Body", name: body, widget: markdown }

  - name: gamedev
    label: "Products"
    folder: content/gamedev
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Date", name: date, widget: datetime, format: "YYYY-MM-DD" }
      - { label: "Description", name: description, widget: text, required: false }
      - { label: "Tags", name: tags, widget: list, required: false }
      - { label: "Image", name: image, widget: image, required: false }
      - { label: "Status", name: status, widget: select, options: ["Released", "In Progress", "Concept"], required: false }
      - { label: "Engine", name: engine, widget: string, required: false }
      - { label: "Role", name: role, widget: string, required: false, hint: "Your role on the project" }
      - { label: "Timeline", name: timeline, widget: string, required: false, hint: "e.g. 2009-2018" }
      - { label: "Featured", name: featured, widget: boolean, default: false, required: false }
      - { label: "Draft", name: draft, widget: boolean, default: false }
      - { label: "Recovered", name: recovered, widget: hidden, required: false }
      - { label: "Body", name: body, widget: markdown }

  - name: pages
    label: "Pages"
    files:
      - label: "About"
        name: about
        file: content/about.md
        fields:
          - { label: "Title", name: title, widget: string }
          - { label: "Layout", name: layout, widget: hidden, default: "single" }
          - { label: "Role", name: role, widget: string, required: false }
          - { label: "Summary", name: summary, widget: text, required: false }
          - label: "Competencies"
            name: competencies
            widget: list
            required: false
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Detail", name: detail, widget: text }
          - { label: "Body", name: body, widget: markdown }
