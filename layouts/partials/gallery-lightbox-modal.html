{{/* Single lightbox modal instance + script reference.
     Include once per page that uses the lightbox. */}}
<div class="lightbox" id="gallery-lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Image viewer">
  <button class="lightbox-close" type="button" aria-label="Close viewer">&times;</button>
  <button class="lightbox-nav lightbox-prev" type="button" aria-label="Previous image">&#8249;</button>
  <button class="lightbox-nav lightbox-next" type="button" aria-label="Next image">&#8250;</button>
  <div class="lightbox-stage" role="document">
    <img class="lightbox-image" src="" alt="" />
    <div class="lightbox-meta">
      <h3 class="lightbox-title"></h3>
      <p class="lightbox-description" hidden></p>
      <a class="lightbox-link" href="#" hidden>Read full post &rarr;</a>
      <p class="lightbox-counter"></p>
    </div>
  </div>
</div>
<script src="/js/gallery-lightbox.js" defer></script>
