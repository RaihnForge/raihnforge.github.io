<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — {{ .Site.Title }}</title>
  <meta name="description" content="This page could not be found. Let's get you back on track." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" />
  <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .error-code {
      font-size: var(--text-5xl);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-size: var(--text-3xl);
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .error-description {
      font-size: var(--text-lg);
      color: var(--text-muted);
      margin-bottom: 2rem;
      max-width: 500px;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <main class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-description">The page you're looking for has wandered off the path. Let's get you back to the main trail.</p>
      <div class="error-actions">
        <a href="/" class="btn-primary">← Back Home</a>
        <a href="/art/" class="btn-secondary">View Work</a>
        <a href="/blog/" class="btn-secondary">Read Journal</a>
      </div>
    </div>
  </main>
</body>
</html>
