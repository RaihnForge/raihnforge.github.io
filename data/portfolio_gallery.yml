# Portfolio gallery — visual-first showcase data file
# Strict 1:1 parity with the section order and asset selection of
# www.raihnforge.com/portfolio-2. Local assets only; legacy WordPress
# uploads recovered into /static/images/portfolio-recovered/.
#
# Schema per item:
#   image: absolute site path to the image (required)
#   title: short caption shown on hover (required)
#   link:  optional internal link to a content/ page for the piece
#          (when present, the lightbox surfaces the linked page's
#          description and a "Read full post" link)
#
# When adding a new section, add it to `sections` in render order and
# matching CSS in style.css under "Portfolio — Visual-first scroll".

